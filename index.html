<style>
  body { font-family: "Zen Maru Gothic", "Nunito", sans-serif; -webkit-tap-highlight-color: transparent; }

  /* ---------- animations ---------- */
  @keyframes pop      { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  @keyframes fadeUp   { from{transform:translateY(14px);opacity:0} to{transform:translateY(0);opacity:1} }
  @keyframes sheetUp  { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes flameBeat{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.18) rotate(-4deg)} }
  @keyframes floaty   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes shake    { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes confetti { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(90px) rotate(540deg);opacity:0} }

  .anim-pop    { animation: pop .45s cubic-bezier(.34,1.56,.64,1) both; }
  .anim-fadeup { animation: fadeUp .35s ease both; }
  .anim-flame  { animation: flameBeat 1.6s ease-in-out infinite; }
  .anim-shake  { animation: shake .3s ease; }
  .cloud       { animation: floaty 4s ease-in-out infinite; }

  .tab-panel { display:none; }
  .tab-panel.active { display:block; animation: fadeUp .3s ease both; }

  /* ---------- flashcard 3D flip ---------- */
  .card-scene { perspective: 1200px; }
  .card-inner { transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,.2,.2,1); position:relative; }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face  { backface-visibility: hidden; -webkit-backface-visibility: hidden; position:absolute; inset:0; }
  .card-back  { transform: rotateY(180deg); }

  /* ---------- passage word tokens ---------- */
  .w-tok { cursor:pointer; border-radius:.4rem; padding:0 .1rem; transition: background .15s, color .15s; }
  .w-tok:active { background:#FFE3D3; }
  .w-tok.target { background:#FFF0E5; color:#F0703F; font-weight:800; border-bottom:2px dashed #FF8A5C; }
  .w-tok.target.done-ok { background:#EAF7E6; color:#57A84E; border-bottom-color:#7BC96F; }
  .w-tok.target.done-ng { background:#F3EDFB; color:#9A7FC9; border-bottom-color:#C3B1E1; }

  /* ---------- bottom sheet ---------- */
  #sheet.open  { animation: sheetUp .3s cubic-bezier(.34,1.3,.64,1) both; }

  /* island element reveal */
  .isl { opacity:0; transform-origin:center bottom; transition: opacity .5s; }
  .isl.show { opacity:1; animation: pop .6s cubic-bezier(.34,1.56,.64,1) both; }

  .mastery-dot { width:7px; height:7px; border-radius:9999px; }

  /* island vocab motifs */
  .motif { animation: pop .55s cubic-bezier(.34,1.56,.64,1) both; }

  .conf { position:absolute; top:0; width:8px; height:8px; border-radius:2px; animation: confetti 1s ease-out forwards; }

  ::-webkit-scrollbar { width:0; height:0; }
</style>
</head>

/* =====================================================================

===================================================================== */

/* review interval by mastery level (forgetting-curve style) */
const INTERVALS = [0, 10*60e3, 1*DAY, 3*DAY, 7*DAY, 14*DAY, 30*DAY];
const MAX_MASTERY = 5;

/* ---------- seed words (first launch) ---------- */
const SEED = [
  ['resilience', '回復力・立ち直る力'],
  ['endeavor',   '努力・試み'],
  ['profound',   '深い・深遠な'],
  ['inevitably', '必然的に・避けられずに'],
  ['curiosity',  '好奇心'],
];

/* ---------- mock AI: predefined passages (word set → EN/JA) ---------- */
const TEMPLATES = [
  {
    words: ['endeavor', 'resilience', 'profound'],
    en: `After years of failure, Mia's small endeavor finally succeeded. Her resilience through every setback taught her a profound lesson: growth rarely feels like growth while it is happening. Looking back, she smiled at how far those quiet struggles had carried her.`,
    ja: `何年もの失敗の末、ミアのささやかな試み（endeavor）はついに実を結んだ。あらゆる挫折を乗り越えた彼女の回復力（resilience）は、深い（profound）教訓を教えてくれた——成長とは、その最中には成長だと感じられないものだ。振り返って、彼女は静かな苦闘がどれほど遠くまで自分を運んでくれたかに微笑んだ。`
  },
  {
    words: ['curiosity', 'inevitably', 'profound'],
    en: `Children ask questions that adults have long stopped asking. Their curiosity leads them, inevitably, to ideas that seem simple yet hide something profound. Perhaps learning a language works the same way: keep asking, keep wondering, and the answers slowly begin to find you.`,

// ざっくり品詞推定（語尾ベース）
function guessPOS(w) {
  const s = String(w).toLowerCase().trim();
  if (s.includes(' ')) return 'phrase';
  if (/ly$/.test(s)) return 'adv';
  if (/(ate|ify|ize|ise)$/.test(s)) return 'verb';
  if (/(ing)$/.test(s)) return 'ing';
  if (/(ous|ful|ive|ic|able|ible|ant|ent|ish|less|ary|ory|al)$/.test(s)) return 'adj';
  if (/(tion|sion|ment|ness|ity|ship|ism|ance|ence|ology|ure|hood|dom)$/.test(s)) return 'noun';
  if (/ed$/.test(s)) return 'adj';
  return 'noun';
}

// トピック辞書の中で実際に動詞として使われる語（これらだけ動詞扱いにする）
const TOPIC_VERBS = new Set(['pray','worship','abolish','mutate','evolve','invade','conquer','forgive','protest','retreat','diagnose','perceive']);

// 単語がどのトピックに属するか（英綴り・日本語意味の両方で判定）
function topicOf(w) {
  const toks = String(w.en || '').toLowerCase().split(/[^a-z]+/).filter(Boolean);
  const ja = String(w.ja || '');
  for (const t of TOPICS) {
    const hitEn = t.en.some(k => toks.some(x => x === k || x === k + 's' || (k.length >= 4 && x.startsWith(k))));
    const hitJa = t.ja.some(k => ja.includes(k));
    if (hitEn || hitJa) return t.id;
  }
  return null;
}

// targets の中で最も多く一致したトピックを選ぶ
function dominantTopic(targets) {
  const tally = {};
  targets.forEach(w => { const id = topicOf(w); if (id) tally[id] = (tally[id] || 0) + 1; });
  let best = null, n = 0;
  for (const id in tally) if (tally[id] > n) { n = tally[id]; best = id; }
  return best ? TOPICS.find(t => t.id === best) : null;
}

function composeNatural(targets, seed) {
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  const topic = dominantTopic(targets);
  // トピックは intros/closes（複数）優先、無ければ intro/close（単数）
  const pick = (arr, one, fallback) =>
    (arr && arr.length) ? arr[seed % arr.length] : (one || fallback[seed % fallback.length]);
  const intro = topic ? pick(topic.intros, topic.intro, INTROS) : INTROS[seed % INTROS.length];
  const closing = topic ? pick(topic.closes, topic.close, CLOSINGS) : CLOSINGS[seed % CLOSINGS.length];
  const enParts = [], jaParts = [];
  targets.forEach((w, i) => {
    const pos = guessPOS(w.en);
    // トピック辞書に載っている語は分野の名詞とみなす（climate/senate など -ate 名詞の誤判定対策）。
    // 明らかな動詞・副詞だけ汎用担い手にフォールバックする。
    const inTopic = !!topic && topicOf(w) === topic.id;
    const verbish = TOPIC_VERBS.has(String(w.en || '').toLowerCase()) ||
                    (!inTopic && (pos === 'verb' || pos === 'adv'));
    const useTopic = !!topic && !verbish;
    const bank = useTopic
      ? topic.carriers
      : (CARRIERS[verbish && pos !== 'adv' ? 'verb' : pos] || CARRIERS.noun);
    const c = bank[(seed + i) % bank.length];
    enParts.push(cap(c.en.replace('{w}', w.en)) + '.');
    jaParts.push(c.ja.replace('{w}', w.en).replace('{m}', w.ja) + '。');
  });
  return {
    en: [intro.en, ...enParts, closing.en].join(' '),
    ja: intro.ja + jaParts.join('') + closing.ja,
    topic: topic ? topic.label : null,
  };
}

    {
      title: 'The Cognitive Cost of Multitasking',
      en: `Modern life extols the ability to juggle multiple tasks simultaneously, and many people take pride in their supposed capacity to multitask. Yet a substantial body of cognitive research suggests that what we commonly call multitasking is largely an illusion. Rather than genuinely attending to several activities at once, the brain rapidly shifts its focus from one task to another, incurring a measurable penalty each time it does so. This phenomenon, known as the "switch cost," manifests itself as slower performance and a heightened propensity for errors. Neuroscientists have found that the prefrontal cortex, the region responsible for executive functions such as planning and decision-making, can effectively concentrate on only one demanding task at a time. When we attempt to divide our attention, cognitive resources become fragmented and the quality of our output deteriorates accordingly. Studies have demonstrated that people who habitually engage with several streams of media are, paradoxically, worse at filtering out irrelevant information than those who do not. The implications extend well beyond mere inefficiency. Chronic multitasking may gradually erode our capacity for sustained concentration, rendering deep, uninterrupted thought increasingly elusive. In an era saturated with notifications and digital distractions, the ability to focus intently on a single endeavor has become both rarer and more valuable. Reversing the trend is no simple matter, for the very technologies that fragment our attention are meticulously engineered to be habit-forming. Breaking free demands deliberate effort—silencing devices, designating uninterrupted intervals for focused labor, and resisting the reflexive urge to seek out fresh stimulation.`,
      ja: `現代の生活は複数の作業を同時にこなす能力を称賛し、多くの人は自分にはマルチタスクができるという思い込みを誇りにしている。しかし、認知に関する数多くの研究は、私たちが一般にマルチタスクと呼ぶものが大部分は錯覚であることを示している。脳は本当に複数の活動に同時に注意を向けているのではなく、ある作業から別の作業へと素早く焦点を切り替えており、そのたびに測定可能な代償を払っている。「切り替えコスト」として知られるこの現象は、処理の遅さと誤りを犯しやすさの高まりとなって現れる。神経科学者は、計画や意思決定といった実行機能をつかさどる前頭前皮質が、負荷の高い作業には一度に一つしか実質的に集中できないことを見いだした。注意を分割しようとすると、認知資源は断片化し、それに応じて成果の質が低下する。研究によれば、複数のメディアを習慣的に扱う人は、逆説的に、そうでない人よりも無関係な情報を排除するのが下手だという。その影響は単なる非効率にとどまらない。慢性的なマルチタスクは、持続的な集中力を徐々に蝕み、深く途切れのない思考をますます捉えどころのないものにしかねない。通知やデジタルな気晴らしに飽和した時代にあって、一つの営みに一心に集中する能力は、いっそう希少で価値あるものとなった。この流れを逆転させるのは簡単ではない。私たちの注意を断片化するまさにその技術が、習慣づけられるよう綿密に設計されているからだ。そこから抜け出すには意図的な努力が要る——機器の音を消し、集中して働くための途切れない時間を確保し、新たな刺激を求めようとする反射的な衝動に抗うことだ。`,

    {
      title: 'The Hidden Logic of Planned Obsolescence',
      en: `Have you ever noticed that electronic devices seem to fail or become outdated with suspicious regularity, often just after their warranties expire? This is not merely a matter of chance. Many critics contend that manufacturers deliberately design products with a limited lifespan, a strategy known as planned obsolescence. By ensuring that goods must be replaced periodically, companies can sustain demand and maximize profits over the long term. The practice assumes several forms. In its most straightforward manifestation, products are built with components prone to wear out or fail after a predictable interval. A subtler variant exploits consumer psychology: through relentless marketing and the ceaseless introduction of new models, manufacturers cultivate the perception that existing possessions are hopelessly outmoded, even when they remain perfectly serviceable. Fashion and smartphones epitomize this dynamic, each new release rendering its predecessor undesirable virtually overnight. The consequences are far from trivial. Environmentally, the relentless cycle of consumption and disposal generates staggering quantities of waste, much of it laden with hazardous materials that resist recycling. Economically, consumers are compelled to spend disproportionate sums replacing goods that could, in principle, have endured for years. Ethically, the deliberate curtailment of a product's usable life strikes many as a cynical manipulation of the very people a company purports to serve. In response, a growing movement champions the "right to repair"—the principle that consumers ought to be able to mend their own devices rather than discard them. Legislators in several countries have begun to heed these demands, though whether such measures can meaningfully curb the excesses of the practice remains to be seen.`,

      title: 'The Problem of Objectivity in Historiography',
      en: `The notion that history constitutes an impartial reconstruction of the past, faithfully mirroring events as they actually transpired, has long since been relegated to the realm of naïve positivism. Contemporary historiography proceeds from the recognition that every historical account is, to a greater or lesser degree, a construction—shaped by the preoccupations, presuppositions, and ideological commitments of the historian who fashions it. The past, being irretrievably gone, is accessible only through fragmentary traces: documents, artifacts, and testimonies that are themselves the residue of particular perspectives and interests. Confronted with this predicament, historians must perpetually adjudicate between competing sources, none of which affords unmediated access to what occurred. The very selection of which events merit narration, and which may be consigned to oblivion, entails an implicit exercise of judgment that no pretense of neutrality can wholly efface. A chronicle foregrounding the machinations of statesmen will inevitably marginalize the anonymous multitudes whose labor sustained those very statesmen. In this sense, every history is also, tacitly, a polemic. None of this, however, need collapse into a corrosive relativism that would deem all interpretations equally valid. The acknowledgment that absolute objectivity is unattainable does not absolve the historian of the obligation to marshal evidence scrupulously, to reason cogently, and to remain answerable to the recalcitrant facts that resist assimilation into any preconceived scheme. There persists a meaningful distinction between an account that conscientiously grapples with the available evidence and one that cavalierly distorts it to serve a predetermined thesis. The upshot is a conception of historical truth that is neither absolute nor arbitrary, but provisional and perpetually contestable—forever subject to revision as fresh evidence surfaces and as successive generations bring their own questions to bear upon the past.`,
      ja: `歴史とは過去の公平な再構成であり、出来事を実際に起こったとおりに忠実に映し出すものだ、という考えは、とうの昔に素朴な実証主義の領域へと追いやられている。現代の歴史記述は、あらゆる歴史叙述が程度の差こそあれ構築物である——それを形づくる歴史家の関心事、前提、思想的立場によって形成されている——という認識から出発する。過去は取り返しのつかない形で去っており、断片的な痕跡、すなわち文書・遺物・証言を通じてのみアクセスできるが、それら自体が特定の視点と利害の残余なのだ。この苦境に直面して、歴史家は競合する諸資料の間を絶えず裁定しなければならないが、そのいずれも起こったことへの媒介なきアクセスを与えてはくれない。どの出来事が語るに値し、どれが忘却に委ねられうるか——その選択そのものが、いかなる中立の装いをもってしても完全には消し去れない、暗黙の判断の行使を含んでいる。政治家たちの策謀を前面に押し出す年代記は、まさにその政治家たちを支えた無名の大衆を必然的に周辺へ追いやる。この意味で、あらゆる歴史は暗黙のうちに一つの論争でもある。とはいえ、こうしたことのどれもが、すべての解釈を等しく妥当とみなすような、蝕む相対主義へと崩れ落ちる必要はない。絶対的な客観性が達成不可能だと認めることは、歴史家を、証拠を細心に整理し、説得力をもって推論し、いかなる先入的な図式にも回収されまいとする御しがたい事実に対して責任を負い続ける義務から免じはしない。手元の証拠に誠実に取り組む叙述と、あらかじめ定めた主張に奉仕するために証拠をぞんざいに歪める叙述との間には、意味ある区別が存続する。結論として得られるのは、絶対的でも恣意的でもなく、暫定的で永久に異議を唱えうる歴史的真理の構想である——新たな証拠が現れ、後続の世代がそれぞれの問いを過去に投げかけるにつれ、絶えず修正にさらされ続けるものだ。`,

    {
      title: 'The Commodification of Attention',
      en: `In the digital economy, a peculiar commodity has acquired unprecedented value: human attention. The proliferation of ostensibly free online services—social networks, search engines, streaming platforms—belies an underlying transaction in which users, far from being the customers, constitute the product. What these enterprises ultimately purvey to their genuine clientele, the advertisers, is access to the finite and increasingly coveted resource of our collective focus. This arrangement has engendered what commentators term the "attention economy," a competitive arena in which myriad interests vie relentlessly to capture and monetize our gaze. The architecture of contemporary platforms is meticulously calibrated to this end, exploiting the brain's susceptibility to intermittent rewards through mechanisms scarcely distinguishable from those underlying compulsive gambling. Infinite scrolls, autoplaying videos, and the sporadic gratification of notifications are not incidental features but deliberate contrivances designed to maximize the duration of engagement. The ramifications transcend the merely personal. When attention becomes a commodity to be harvested, the incentives of platform operators diverge sharply from the well-being of their users. Content that provokes outrage tends to propagate more virally than sober, measured discourse, for inflammatory material is preternaturally adept at arresting attention. The consequence is an information ecosystem that inadvertently privileges sensationalism over substance and stridency over nuance, with corrosive implications for the quality of public deliberation. Extricating ourselves from these dynamics is rendered formidable by the sheer sophistication of the apparatus arrayed against our self-command. Individual acts of resistance are salutary but insufficient in isolation; ultimately, the pathologies of the attention economy may demand structural remedies—regulatory constraints on the most manipulative practices, and business models predicated on something other than the ceaseless extraction of our finite capacity for focus.`,
      ja: `デジタル経済において、ある奇妙な商品が前例のない価値を帯びるようになった。人間の注意である。表向きは無料のオンラインサービス——ソーシャルネットワーク、検索エンジン、ストリーミング基盤——の急増は、利用者が顧客であるどころか商品そのものを構成する、という根底の取引を覆い隠している。これらの企業が真の顧客である広告主に最終的に売っているのは、私たちの集合的な注意という、有限でますます切望される資源へのアクセスなのだ。この仕組みは、評者が「注意経済」と呼ぶもの——無数の利害が私たちの視線を捕らえて収益化しようと絶え間なく競い合う競争の場——を生み出した。現代の基盤の構造は、この目的のために綿密に調整されており、断続的な報酬に対する脳の影響されやすさを、強迫的なギャンブルを支えるものとほとんど見分けのつかない仕掛けを通じて利用する。無限スクロール、自動再生される動画、通知による散発的な満足は、付随的な機能ではなく、関与の持続時間を最大化するために設計された意図的な仕掛けである。その影響は個人的な次元を超える。注意が収穫されるべき商品になると、基盤運営者の動機は利用者の幸福から鋭く乖離する。憤りをかき立てる内容は、冷静で節度ある言説よりもウイルスのように広まりやすい。扇動的な材料は注意を引きつけるのに異常なほど長けているからだ。その結果は、実質より扇情を、機微より耳障りな激しさを、意図せず優遇する情報生態系であり、公共の熟議の質にとって蝕むような含意を持つ。こうした力学から自らを引き離すことは、私たちの自制心に対して配された装置のすさまじい精巧さゆえに、困難きわまりない。個人の抵抗の行為は有益ではあるが、単独では不十分だ。結局のところ、注意経済の病理は構造的な対処——最も操作的な慣行への規制上の制約と、私たちの有限な集中力を絶え間なく抽出すること以外に基づく事業モデル——を要求するのかもしれない。`,

/* =====================================================================
   state
===================================================================== */
let state = load();
function load() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if (s && Array.isArray(s.words)) return s;
  } catch(e) {}
  return {
    words: SEED.map(([en, ja], i) => makeWord(en, ja)),
    streak: 0, lastDone: null,
  };
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function makeWord(en, ja) {
  return { id: Math.random().toString(36).slice(2), en: en.toLowerCase().trim(), ja: ja.trim(),
           mastery: 0, next: Date.now(), added: Date.now() };
}
const findWord = (en) => state.words.find(w => w.en === en.toLowerCase());
const dueWords = () => state.words.filter(w => w.next <= Date.now())
                                  .sort((a,b) => a.mastery - b.mastery || a.next - b.next);
const points   = () => state.words.reduce((s,w) => s + w.mastery, 0);

/* ---------- spaced repetition ---------- */
function gradeWord(w, ok) {
  if (ok) { w.mastery = Math.min(MAX_MASTERY, w.mastery + 1); w.next = Date.now() + INTERVALS[w.mastery]; }
  else    { w.mastery = Math.max(0, w.mastery - 1);           w.next = Date.now(); } // すぐ再登場
  save(); renderHeader();
}

/* ---------- daily learned counter ---------- */
const dayKey = (t) => new Date(t).toISOString().slice(0,10);
function learnedToday() {
  return (state.daily && state.daily.date === dayKey(Date.now())) ? state.daily.count : 0;
}
function addLearned(n) {
  const t = dayKey(Date.now());
  if (!state.daily || state.daily.date !== t) state.daily = { date: t, count: 0 };
  state.daily.count += n;
  save();
  const el = document.getElementById('learnedToday');
  if (el) el.textContent = learnedToday();
}

/* ---------- streak ---------- */
function markStudied() {
  const today = dayKey(Date.now());
  if (state.lastDone === today) return false;
  const yesterday = dayKey(Date.now() - DAY);
  state.streak = (state.lastDone === yesterday) ? state.streak + 1 : 1;
  state.lastDone = today;
  save(); renderHeader();
  document.getElementById('todayDoneMsg').classList.remove('hidden');
  burstConfetti();
  return true;
}

/* =====================================================================
   header / island
===================================================================== */
const islandLevel = () => 1 + Math.floor(points() / 7);

function renderHeader() {
  const p = points();
  document.getElementById('pointsNum').textContent = p;
  document.getElementById('dueNum').textContent    = dueWords().length;
  document.getElementById('totalNum').textContent  = state.words.length;
  document.getElementById('streakNum').textContent = state.streak;
  document.getElementById('homeDue').textContent   = dueWords().length;
  document.getElementById('learnedToday').textContent = learnedToday();
  document.getElementById('flame').className = state.streak > 0 ? 'inline-block anim-flame' : 'inline-block grayscale opacity-40';

  document.getElementById('islandLv').textContent = 'Lv.' + islandLevel();
  document.querySelectorAll('#island .isl').forEach(el => {
    el.classList.toggle('show', p >= +el.dataset.th);
  });
  renderIsland();
  if (state.lastDone === dayKey(Date.now()))
    document.getElementById('todayDoneMsg').classList.remove('hidden');
}

function wordMatchesMotif(w, m) {
  const toks = String(w.en || '').toLowerCase().split(/[^a-z]+/).filter(Boolean);
  const ja = String(w.ja || '');
  const hitEn = m.en.some(k => toks.some(t => t === k || t === k + 's' || (k.length >= 4 && t.startsWith(k))));
  const hitJa = m.ja.some(k => ja.includes(k));
  return hitEn || hitJa;
}

const matchedMotifs = () => MOTIFS.filter(m => state.words.some(w => wordMatchesMotif(w, m))).slice(0, 14);

function renderIsland() {
  const g = document.getElementById('islandDynamic');
  if (!g) return;
  g.innerHTML = matchedMotifs().map(m =>
    `<text x="${m.x}" y="${m.y}" font-size="${m.s}" text-anchor="middle" dominant-baseline="central" class="motif">${m.e}</text>`
  ).join('');
}

function toggleEikenJa() { currentEiken.showJa = !currentEiken.showJa; renderEiken(); }

function answerEiken(i) {
  if (currentEiken.answered !== null) return;
  currentEiken.answered = i;
  renderEiken();

function finishEiken() {
  addLearned(1);
  markStudied();
  toast('英検長文を読了！🔥');

  window.scrollTo({ top: 0, behavior: 'smooth' });

function pickTargets() {
  let pool = dueWords();
  if (pool.length < 3) {
    // 復習待ちが少ないときは熟練度の低い単語で補完（プロトタイプ挙動）
    const extra = state.words.filter(w => !pool.includes(w)).sort((a,b) => a.mastery - b.mastery);
    pool = pool.concat(extra);
  }
  return pool.slice(0, 5);
}

function generatePassage(shuffle) {
  if (shuffle) genSeed++;
  const pool = pickTargets();
  if (pool.length === 0) {
    document.getElementById('readArea').innerHTML = `
      <div class="bg-white rounded-4xl p-8 text-center shadow-sm">
        <div class="text-4xl mb-2">📭</div>
        <div class="font-bold">単語がまだ登録されていません</div>
        <div class="text-xs text-ink/50 mt-1">「単語帳」タブから追加してね</div>
      </div>`;
    currentPassage = null;
    return;
  }
  const poolSet = new Set(pool.map(w => w.en));

  // 完全一致するテンプレートを探す（AI生成のシミュレーション）
  const candidates = TEMPLATES
    .map(t => ({ t, hit: t.words.filter(w => poolSet.has(w)).length }))
    .filter(x => x.hit === x.t.words.length)
    .sort((a,b) => b.hit - a.hit);

  let en, ja, targets, topic = null;
  if (candidates.length) {
    const chosen = candidates[genSeed % candidates.length].t;
    en = chosen.en; ja = chosen.ja;
    targets = chosen.words.map(findWord).filter(Boolean);
  } else {
    // 単語の意味から分野を推定し、その文脈で英文を組み立てる（擬似AI生成）
    targets = pool.slice(0, Math.min(4, pool.length));
    const out = composeNatural(targets, genSeed);
    en = out.en; ja = out.ja; topic = out.topic;
  }
  currentPassage = { en, ja, targets, graded: {}, showJa: false, topic };
  renderRead();
}

function renderRead() {
  const p = currentPassage;
  const area = document.getElementById('readArea');
  const targetSet = new Set(p.targets.map(w => w.en));

  // tokenize: wrap each word in a clickable span
  const html = p.en.split(/(\s+)/).map(tok => {
    if (/^\s+$/.test(tok)) return tok;
    const clean = tok.replace(/^["'(“]+|["')!?.,:;”—]+$/g, '');
    const key = clean.toLowerCase();
    if (!clean) return esc(tok);
    const isTarget = targetSet.has(key);
    const g = p.graded[key];
    const cls = 'w-tok' + (isTarget ? ' target' + (g === true ? ' done-ok' : g === false ? ' done-ng' : '') : '');
    return tok.replace(clean, `<span class="${cls}" data-w="${esc(key)}" onclick="tapWord(event,'${esc(key)}')">${esc(clean)}</span>`);
  }).join('');

  const allGraded = p.targets.every(w => p.graded[w.en] !== undefined);

  area.innerHTML = `
    <div class="bg-white rounded-4xl p-5 shadow-sm anim-fadeup">
      <div class="flex items-center gap-2 mb-3 flex-wrap">
        <span class="text-[10px] font-bold bg-coral/10 text-coralD rounded-full px-2.5 py-1">✨ AI生成（モック）</span>
        ${p.topic ? `<span class="text-[10px] font-bold bg-lav/20 text-[#6b52a3] rounded-full px-2.5 py-1">🏷️ ${esc(p.topic)}</span>` : ''}
        <span class="text-[10px] text-ink/40">ターゲット ${p.targets.length} 語入り</span>
      </div>
      <p class="leading-8 text-[15px] font-num">${html}</p>

      <button onclick="toggleJa()" class="mt-4 w-full bg-sky2/40 text-ink font-bold rounded-2xl py-2.5 text-sm active:scale-[.98] transition">
        ${p.showJa ? '🙈 日本語訳をかくす' : '🇯🇵 日本語訳'}
      </button>
      <div class="${p.showJa ? '' : 'hidden'} mt-3 bg-cream rounded-2xl p-4 text-[13px] leading-6 anim-fadeup">${esc(p.ja)}</div>
    </div>

    <div class="bg-white rounded-4xl p-5 shadow-sm mt-3">
      <div class="text-xs font-bold text-ink/50 mb-3">ターゲット単語 — 読めた？（オレンジの単語をタップすると意味を確認できます）</div>
      <div class="space-y-2">
        ${p.targets.map(w => {
          const g = p.graded[w.en];
          return `
          <div class="flex items-center gap-2 bg-cream rounded-2xl px-3 py-2 ${g!==undefined ? 'opacity-80' : ''}">
            <div class="flex-1 min-w-0">
              <span class="font-extrabold font-num text-sm">${esc(w.en)}</span>
              <span class="text-[11px] text-ink/45 ml-1">${g === false ? esc(w.ja) : g === true ? '✓' : ''}</span>
            </div>
            <div class="flex gap-1.5 shrink-0">
              <button onclick="gradeTarget('${esc(w.en)}', true)"  class="text-xs font-bold rounded-xl px-3 py-1.5 transition-all ${g===true  ? 'bg-leaf text-white' : 'bg-white shadow-sm active:scale-95'}">読めた</button>
              <button onclick="gradeTarget('${esc(w.en)}', false)" class="text-xs font-bold rounded-xl px-3 py-1.5 transition-all ${g===false ? 'bg-lav text-white'  : 'bg-white shadow-sm active:scale-95'}">🤔 確認</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <button onclick="finishReading()" ${allGraded ? '' : 'disabled'}
        class="mt-4 w-full font-extrabold rounded-2xl py-3.5 transition-all
        ${allGraded ? 'bg-coral text-white shadow-[0_4px_0_#F0703F] active:translate-y-0.5 active:shadow-none' : 'bg-sand text-ink/30'}">
        ${allGraded ? '📚 読了！ポイントゲット' : 'すべての単語をチェックしよう'}
      </button>
    </div>`;
}

function toggleJa() { currentPassage.showJa = !currentPassage.showJa; renderRead(); }

function gradeTarget(en, ok) {
  const p = currentPassage;
  if (p.graded[en] !== undefined) { // 変更可
    // 前回の採点を取り消してから付け直す（プロトタイプでは熟練度は最後の選択のみ反映）
  }
  p.graded[en] = ok;
  renderRead();
}

function finishReading() {
  const p = currentPassage;
  let up = 0, down = 0;
  p.targets.forEach(w => {
    const word = findWord(w.en);
    if (!word) return;
    gradeWord(word, p.graded[w.en] === true);
    p.graded[w.en] === true ? up++ : down++;
  });
  addLearned(up + down);
  markStudied();
  toast(`熟練度UP ${up} 語 / 要復習 ${down} 語`);
  currentPassage = null;
  generatePassage(true);
}

/* re-render whichever reading view is active */
function rerenderRead() {
  if (readMode === 'eiken') { if (currentEiken) renderEiken(); }
  else if (currentPassage) renderRead();
}

/* ---------- tap a word inside the passage ---------- */
function tapWord(ev, key) {
  ev.stopPropagation();
  const eiken = readMode === 'eiken';
  const p = currentPassage;
  const registered = findWord(key);
  const isTarget = !eiken && p && p.targets.some(w => w.en === key);

  // ターゲット単語の意味をタップで確認 → 忘却曲線的に「まだ」扱い（マイ単語モードのみ）
  let autoNote = '';
  if (isTarget && p.graded[key] === undefined) {
    p.graded[key] = false;
    autoNote = `<div class="text-[11px] bg-lav/20 text-[#7d5fb0] rounded-xl px-3 py-2 mt-3">🤔 意味を確認したので「要復習」にマークしました（熟練度は読了時に反映）</div>`;
    renderRead();
  }

  // 意味の優先順位: 登録済み > 英検の語注 > 内蔵辞書
  const glossJa = eiken && currentEiken ? currentEiken.data.gloss[key] : null;
  const dictJa = registered ? registered.ja : (glossJa || DICT[key]);
  let body;
  if (dictJa) {
    body = `
      <div class="text-2xl font-extrabold font-num mb-1">${esc(key)}</div>
      <div class="text-base font-bold text-ink/80 mb-1">${esc(dictJa)}</div>
      ${registered
        ? `<div class="flex gap-1 items-center mt-2">${masteryDots(registered.mastery)}<span class="text-[10px] text-ink/40 ml-1">熟練度</span></div>
           <div class="text-[11px] text-ink/40 mt-2">✅ カード登録済み</div>`
        : `<button onclick="registerFromSheet('${esc(key)}', '${esc(dictJa)}')"
             class="mt-4 w-full bg-coral text-white font-extrabold rounded-2xl py-3 shadow-[0_4px_0_#F0703F] active:translate-y-0.5 active:shadow-none transition-all">
             ➕ この単語をカードに追加</button>`}
      ${autoNote}`;
  } else {
    body = `
      <div class="text-2xl font-extrabold font-num mb-1">${esc(key)}</div>
      <div class="text-xs text-ink/50 mb-3">辞書にない単語です。意味を入力して登録できます（本番ではAI/辞書APIが自動入力）。</div>
      <input id="sheetJa" type="text" placeholder="意味を入力（例: 〜という意味）" class="w-full bg-cream rounded-2xl px-4 py-3 text-sm mb-3 outline-none focus:ring-2 ring-coral/50">
      <button onclick="registerFromSheet('${esc(key)}', null)"
        class="w-full bg-coral text-white font-extrabold rounded-2xl py-3 shadow-[0_4px_0_#F0703F] active:translate-y-0.5 active:shadow-none transition-all">➕ カードに追加</button>
      ${autoNote}`;
  }
  openSheet(body);
}

function registerFromSheet(en, ja) {
  if (ja === null) {
    ja = (document.getElementById('sheetJa')?.value || '').trim();
    if (!ja) { document.getElementById('sheetJa').classList.add('anim-shake'); setTimeout(()=>document.getElementById('sheetJa')?.classList.remove('anim-shake'),350); return; }
  }
  if (!findWord(en)) {
    state.words.push(makeWord(en, ja));
    save(); addLearned(1); renderHeader();
    toast(`「${en}」をカードに追加しました 🌱`);
  }
  closeSheet();
  rerenderRead();
}

function openSheet(html) {
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheetWrap').classList.remove('hidden');
  const s = document.getElementById('sheet');
  s.classList.remove('open'); void s.offsetWidth; s.classList.add('open');
}
function closeSheet() { document.getElementById('sheetWrap').classList.add('hidden'); }

/* =====================================================================
   ④ word list
===================================================================== */
function addWordFromForm() {
  const enEl = document.getElementById('newEn'), jaEl = document.getElementById('newJa');
  const en = enEl.value.trim(), ja = jaEl.value.trim();
  if (!en || !ja) {
    (en ? jaEl : enEl).classList.add('anim-shake');
    setTimeout(() => (en ? jaEl : enEl).classList.remove('anim-shake'), 350);
    return;
  }
  if (findWord(en)) { toast('すでに登録されています'); return; }
  state.words.push(makeWord(en, ja));
  save(); addLearned(1); renderHeader(); renderWordList();
  enEl.value = ''; jaEl.value = '';
  toast(`「${en}」を追加！島が育つよ 🌱`);
}

function renderWordList() {
  const host = document.getElementById('wordList');
  const sorted = [...state.words].sort((a,b) => a.mastery - b.mastery || b.added - a.added);
  host.innerHTML = sorted.map(w => {
    const due = w.next <= Date.now();
    return `
    <div class="bg-white rounded-3xl px-4 py-3 shadow-sm flex items-center gap-3 anim-fadeup">
      <div class="flex-1 min-w-0">
        <div class="font-extrabold font-num text-sm">${esc(w.en)}
          ${due ? '<span class="text-[9px] bg-coral/10 text-coralD font-bold rounded-full px-1.5 py-0.5 ml-1 align-middle">要復習</span>' : ''}
        </div>
        <div class="text-[11px] text-ink/50 truncate">${esc(w.ja)}</div>
      </div>
      <div class="flex gap-1 shrink-0">${masteryDots(w.mastery)}</div>
      <button onclick="deleteWord('${w.id}')" class="text-ink/25 text-sm px-1 active:scale-90 transition">✕</button>
    </div>`;
  }).join('') || '<div class="text-center text-xs text-ink/40 py-8">単語がありません</div>';
}
function deleteWord(id) {
  state.words = state.words.filter(w => w.id !== id);
  save(); renderHeader(); renderWordList();
}

/* ---------- util ---------- */
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- 成果カード画像を生成して共有 ---------- */
const loadImg = (src) => new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = src; });
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

async function buildShareImage() {
  // 島SVGを静止画としてラスタライズ（非表示の成長要素は除去、アニメ停止）
  // 絵文字モチーフはラスタライズ非対応環境があるため、SVGからは外してcanvasに直接描画する
  const svg = document.getElementById('island').cloneNode(true);
  svg.querySelectorAll('.isl:not(.show)').forEach(el => el.remove());
  const dyn = svg.querySelector('#islandDynamic'); if (dyn) dyn.remove();
  svg.querySelectorAll('*').forEach(el => { el.style.animation = 'none'; el.style.opacity = el.style.opacity || '1'; });
  svg.setAttribute('width', '640'); svg.setAttribute('height', '340');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  const svgStr = new XMLSerializer().serializeToString(svg);
  const islandImg = await loadImg('data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr));

  const W = 1080, H = 1350, cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#EAF6FB'); bg.addColorStop(1, '#FDF6EC');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center'; ctx.fillStyle = '#4A3F3C';
  ctx.font = '800 52px "Nunito", sans-serif';
  ctx.fillText('🏝️ ContextVocab', W / 2, 118);

  // island card
  const iw = 940, ih = iw * 340 / 640, ix = (W - iw) / 2, iy = 170;
  ctx.save();
  roundRect(ctx, ix, iy, iw, ih, 44); ctx.fillStyle = '#BFE3F2'; ctx.fill();
  ctx.clip();
  ctx.drawImage(islandImg, ix, iy, iw, ih);
  // vocab motifs painted directly (crisp emoji on every platform)
  const sc = iw / 320;
  ctx.textBaseline = 'middle';
  matchedMotifs().forEach(m => {
    ctx.font = Math.round(m.s * sc * 1.25) + 'px "Segoe UI Emoji","Noto Color Emoji","Apple Color Emoji",sans-serif';
    ctx.fillText(m.e, ix + m.x * sc, iy + m.y * (ih / 170));
  });
  ctx.textBaseline = 'alphabetic';
  ctx.restore();

  // big number
  const n = learnedToday();
  ctx.fillStyle = '#F0703F'; ctx.font = '900 190px "Nunito", sans-serif';
  ctx.fillText(String(n), W / 2, iy + ih + 250);
  ctx.fillStyle = '#4A3F3C'; ctx.font = '800 56px "Zen Maru Gothic", sans-serif';
  ctx.fillText('今日学んだ語数', W / 2, iy + ih + 330);

  // streak + totals
  ctx.font = '800 56px "Zen Maru Gothic", sans-serif'; ctx.fillStyle = '#4A3F3C';
  ctx.fillText('🔥 ' + state.streak + '日連続    📚 登録 ' + state.words.length + '語', W / 2, iy + ih + 430);
  ctx.fillStyle = '#57A84E'; ctx.font = '700 44px "Zen Maru Gothic", sans-serif';
  ctx.fillText('マイ・アイランド Lv.' + islandLevel() + '  ・  育てポイント ' + points() + 'pt', W / 2, iy + ih + 500);

  ctx.fillStyle = '#9b8f8a'; ctx.font = '600 38px "Nunito", sans-serif';
  const d = new Date();
  const ds = `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
  ctx.fillText(ds + '   |   soba314159.github.io/context-vocab', W / 2, H - 66);

  return new Promise(res => cv.toBlob(res, 'image/png'));
}

async function shareToInsta() {
  toast('カードを作成中…📸');
  let blob;
  try { blob = await buildShareImage(); } catch (e) { toast('画像の生成に失敗しました'); return; }
  if (!blob) { toast('画像の生成に失敗しました'); return; }

  const file = new File([blob], 'contextvocab.png', { type: 'image/png' });
  const caption =
    `今日は英単語を${learnedToday()}語 学習！🔥${state.streak}日連続でマイ・アイランドが育ってます🏝️\n` +
    `#ContextVocab #英語学習 #英検 #単語帳\nsoba314159.github.io/context-vocab`;

  // モバイルはネイティブ共有シート（Instagram等が選べる）
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file], text: caption, title: 'ContextVocab' }); return; }
    catch (e) { if (e && e.name === 'AbortError') return; }
  }

  // フォールバック: 画像を保存＋キャプションをコピー
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'contextvocab.png'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
  let copied = false;
  try { await navigator.clipboard.writeText(caption); copied = true; } catch (e) {}
  openSheet(`
    <div class="text-center">
      <div class="text-4xl mb-2">📸</div>
      <div class="font-extrabold mb-1">カード画像を保存しました</div>
      <div class="text-xs text-ink/50 mb-3">Instagramアプリを開いて、保存した画像で投稿してね（ストーリーズ／フィード どちらもOK）。${copied ? 'キャプションはコピー済みです。' : ''}</div>
      <div class="bg-cream rounded-2xl p-3 text-[11px] text-left whitespace-pre-wrap leading-5">${esc(caption)}</div>
      ${copied ? '' : '<button onclick="navigator.clipboard.writeText(this.dataset.c).then(()=>toast(\'コピーしました\'))" data-c="'+esc(caption)+'" class="mt-3 w-full bg-white shadow-sm rounded-2xl py-2.5 text-sm font-bold">キャプションをコピー</button>'}
      <button onclick="closeSheet()" class="mt-3 w-full bg-coral text-white font-extrabold rounded-2xl py-3 shadow-[0_4px_0_#F0703F] active:translate-y-0.5 active:shadow-none transition-all">OK</button>
    </div>`);
}

/* --- lightweight open counter (privacy-friendly, no cookies/PII) --- */
function pingOpen() {
  try {
    // 1日1回だけカウント（同一端末の重複を抑制）
    const today = dayKey(Date.now());
    if (localStorage.getItem('ctxvocab_pinged') === today) return;
    localStorage.setItem('ctxvocab_pinged', today);
    fetch(`https://api.counterapi.dev/v1/${COUNTER_NS}/opens/up`, { keepalive: true }).catch(() => {});
  } catch (e) {}
}

/* --- owner stats view: open index.html?stats --- */
function maybeShowStats() {
  if (!/[?&]stats/.test(location.search)) return;
  fetch(`https://api.counterapi.dev/v1/${COUNTER_NS}/opens/`)
    .then(r => r.json())
    .then(d => {
      const box = document.createElement('div');
      box.className = 'fixed top-3 inset-x-0 z-[70] flex justify-center';
      box.innerHTML = `<div class="bg-ink text-white rounded-2xl px-5 py-3 shadow-xl text-center anim-pop">
        <div class="text-[11px] opacity-70">これまでの起動回数（1日1端末カウント）</div>
        <div class="text-2xl font-extrabold font-num">${d.count ?? '—'} <span class="text-sm">回</span></div>
      </div>`;
      document.body.appendChild(box);
    }).catch(() => {});
}

/* --- PWA install prompt --- */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn')?.classList.remove('hidden');
});
function doInstall() {
  if (!deferredPrompt) { toast('ブラウザのメニューから「ホーム画面に追加」を選んでね'); return; }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(() => {
    deferredPrompt = null;
    document.getElementById('installBtn')?.classList.add('hidden');
  });
}
window.addEventListener('appinstalled', () => document.getElementById('installBtn')?.classList.add('hidden'));

/* --- register service worker (offline support + auto-update) --- */
if ('serviceWorker' in navigator) {
  // 新しいSWが制御を引き継いだら、一度だけ自動リロードして最新表示に切替
  let swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swReloaded) return;
    swReloaded = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then((reg) => {
      reg.addEventListener('updatefound', () => {
        const nw = reg.installing;
        if (nw) nw.addEventListener('statechange', () => {
          if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage?.('skip');
        });
      });
      reg.update?.();
    }).catch(() => {});
  });
}
